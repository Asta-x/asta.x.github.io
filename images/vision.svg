<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5a2"/>
      <stop offset="100%" style="stop-color:#3a7d44"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Sky -->
  <rect width="500" height="200" fill="#87ceeb" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="420" cy="60" r="35" fill="#FFE066" opacity="0.9"/>
  <!-- Hills -->
  <ellipse cx="100" cy="300" rx="200" ry="100" fill="#2a5a35" opacity="0.7"/>
  <ellipse cx="400" cy="320" rx="180" ry="90" fill="#1e4228" opacity="0.8"/>
  <!-- Person silhouette -->
  <circle cx="250" cy="160" r="22" fill="#1a2e1c"/>
  <rect x="236" y="182" width="28" height="60" fill="#1a2e1c" rx="4"/>
  <rect x="214" y="188" width="22" height="10" fill="#1a2e1c" rx="3"/>
  <rect x="264" y="188" width="22" height="10" fill="#1a2e1c" rx="3"/>
  <rect x="236" y="242" width="11" height="40" fill="#1a2e1c" rx="3"/>
  <rect x="253" y="242" width="11" height="40" fill="#1a2e1c" rx="3"/>
  <!-- Binoculars -->
  <rect x="220" y="192" width="14" height="9" fill="#c8a84b" rx="2"/>
  <rect x="238" y="192" width="14" height="9" fill="#c8a84b" rx="2"/>
  <!-- Compass decoration -->
  <circle cx="420" cy="280" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <text x="420" y="285" font-size="20" text-anchor="middle" fill="white" opacity="0.7">✦</text>
</svg>
